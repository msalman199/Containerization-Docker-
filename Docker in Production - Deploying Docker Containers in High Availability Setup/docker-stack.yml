version: '3.8'

services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.labels.role == frontend
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    networks:
      - app-network

  api:
    image: httpd:alpine
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.role == backend
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - app-network

  database:
    image: postgres:13-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: securepassword
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == database
      restart_policy:
        condition: on-failure
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network

configs:
  nginx_config:
    external: true

volumes:
  db-data:
    driver: local

networks:
  app-network:
    driver: overlay
    attachable: true
