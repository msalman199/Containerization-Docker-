apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-cloud-app
  labels:
    app: docker-cloud-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: docker-cloud-app
  template:
    metadata:
      labels:
        app: docker-cloud-app
    spec:
      containers:
      - name: docker-cloud-app
        image: us.icr.io/your-namespace/docker-cloud-app:v1.0
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
