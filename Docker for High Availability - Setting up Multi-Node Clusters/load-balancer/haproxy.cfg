global
    daemon
    maxconn 4096

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    option httplog
    option dontlognull
    option redispatch
    retries 3

frontend web_frontend
    bind *:8081
    default_backend web_servers
    
    # Health check endpoint
    monitor-uri /health

backend web_servers
    balance roundrobin
    option httpchk GET /
    
    # Add all swarm nodes as potential backends
    server web1 192.168.1.10:80 check inter 2000ms rise 2 fall 3
    server web2 192.168.1.11:80 check inter 2000ms rise 2 fall 3
    server web3 192.168.1.12:80 check inter 2000ms rise 2 fall 3

stats enable
stats uri /stats
stats refresh 30s
stats admin if TRUE
