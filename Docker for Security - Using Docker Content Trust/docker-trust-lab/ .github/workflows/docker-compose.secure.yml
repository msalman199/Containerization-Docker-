version: '3.8'

services:
  secure-app:
    image: labuser/secure-app:v1.0
    ports:
      - "5000:5000"
    environment:
      - DOCKER_CONTENT_TRUST=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    
  nginx:
    image: nginx:1.21-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - secure-app
    restart: unless-stopped

networks:
  default:
    driver: bridge
