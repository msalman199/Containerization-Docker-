apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-docker-app
  labels:
    app: kubernetes-docker-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kubernetes-docker-app
  template:
    metadata:
      labels:
        app: kubernetes-docker-app
    spec:
      containers:
      - name: kubernetes-docker-app
        image: YOUR_DOCKERHUB_USERNAME/kubernetes-docker-app:v1.0
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
